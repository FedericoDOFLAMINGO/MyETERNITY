/* carta */

.carta{
width:340px;
max-width:90%;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
box-shadow:0 20px 50px rgba(0,0,0,0.3);
animation:entrada 1.5s ease;
}

.titulo{
font-size:28px;
text-align:center;
color:#b030b0;
margin-bottom:15px;
}

.texto{
font-size:16px;
line-height:1.6;
text-align:center;
color:#333;
min-height:200px;
}

/* animacion carta */

@keyframes entrada{
from{
opacity:0;
transform:translateY(40px) scale(.8);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

/* corazones */

.corazon{
position:absolute;
font-size:20px;
animation:flotar 7s linear infinite;
opacity:.8;
}

@keyframes flotar{
0%{
transform:translateY(110vh) scale(.5);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-10vh) scale(1.4);
opacity:0;
}
}

/* boton */

button{
margin-top:15px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#b030b0;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#912491;
}

</style>
</head>

<body>

<div class="carta">

<div class="titulo">Para Ti 💜</div>

<div class="texto" id="texto"></div>

<button onclick="musica()">💖 Detalle para tu Dia 💖</button>

</div>

<!-- corazones -->

<div class="corazon" style="left:10%">💖</div>
<div class="corazon" style="left:25%; animation-delay:1s;">💜</div>
<div class="corazon" style="left:40%; animation-delay:2s;">💗</div>
<div class="corazon" style="left:60%; animation-delay:3s;">💖</div>
<div class="corazon" style="left:75%; animation-delay:4s;">💜</div>
<div class="corazon" style="left:90%; animation-delay:5s;">💗</div>

<audio id="audio">
<source src="MiGirl.m4a" type="audio/mp4">
</audio>>
<script>

/* texto romantico */

let mensaje = `
Quería escribirte algo bonito.

Algo que puedas leer cuando necesites recordar lo especial que eres.

Desde que llegaste a mi vida,
los días se sienten diferentes.

Todo parece más bonito.

Tu sonrisa tiene una forma de alegrar cualquier momento,
y tu manera de ser hace que el mundo se sienta un lugar más cálido.

Tal vez a veces no te das cuenta de lo increíble que eres,
pero créeme cuando te digo que lo eres.

Eres fuerte.
Eres especial.
Y tienes un corazón hermoso.

Y si algún día llegas a olvidarlo,
yo siempre voy a estar aquí para recordártelo.

Porque para mí...

eres alguien verdaderamente importante.
Eres todo de mi y siempre tendrás todo lo bueno de mí porque mereces todo lo lindo y un amor tan perfecto mi niña.💜
`;

let i = 0;

function escribir(){
if(i < mensaje.length){
document.getElementById("texto").innerHTML += mensaje.charAt(i);
i++;
setTimeout(escribir,35);
}
}

escribir();

/* musica */

function musica(){
document.getElementById("audio").play();
}

</script>

</body>
</html>
